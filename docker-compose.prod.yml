version: '3.8'

services:
  php:
    build:
      context: .                          
      dockerfile: docker/php/Dockerfile   
    container_name: laravel_php_kelompok_2
    restart: unless-stopped               
    working_dir: /var/www/html

    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini  

    networks:
      - laravel_network

    depends_on:
      - mysql
      # - redis

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx_kelompok_2
    restart: unless-stopped

    ports:
      - "80:80"
      - "1234:443"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot:ro
      - ./data:/etc/letsencrypt

    networks:
      - laravel_network

    depends_on:
      - php

  certbot:
    image: certbot/certbot
    container_name: laravel_certbot_kelompok_2
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./data:/etc/letsencrypt
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped

    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-app}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}

    ports:
      - "33060:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - laravel_network

    command: --default-authentication-plugin=caching_sha2_password

  # redis:
  #   image: redis:7-alpine
  #   container_name: laravel_redis
  #   restart: unless-stopped

  #   ports:
  #     - "6379:6379"

  #   volumes:
  #     - redis_data:/data

  #   networks:
  #     - laravel_network

  #   command: redis-server --appendonly yes

networks:
  laravel_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  # redis_data:
  #   driver: local